<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="assets/chat-uploader.css">
<style>
 body{font-family:system-ui,sans-serif;background:#fff;margin:0;padding:26px;color:#3c4257}
 h3{font-size:14px;margin:0 0 14px;color:#8b95a9;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
 .row{display:flex;align-items:center;gap:38px;margin-bottom:30px}
 .cell{text-align:center}
 .cell small{display:block;margin-top:8px;color:#8b95a9;font-size:12px}
 .btn{background:#6c5ffc;border:none;color:#fff;border-radius:6px;padding:9px 20px;
      display:inline-flex;align-items:center;gap:8px;font-size:14px}
 .btnw{background:#fff;border:1px solid #e3e6ef;color:#3c4257;border-radius:6px;padding:9px 20px;
      display:inline-flex;align-items:center;gap:8px;font-size:14px}
 .scrollbox{width:290px;height:150px;overflow-y:auto;border:1px solid #e3e6ef;
      border-radius:8px;padding:12px;font-size:13px;line-height:1.7}
</style></head><body>
<h3>The spinner — one icon, every action</h3>
<div class="row">
  <div class="cell"><span class="pcu-spinner pcu-spinner-lg"></span><small>Page load (44px)</small></div>
  <div class="cell"><span class="pcu-spinner" style="--pcu-spinner-size:28px"></span><small>Section (28px)</small></div>
  <div class="cell"><button class="btn"><span class="pcu-spinner"></span> Uploading…</button><small>In a button</small></div>
  <div class="cell"><button class="btnw"><span class="pcu-spinner"></span> Sending…</button><small>Light button</small></div>
</div>
</body></html>
